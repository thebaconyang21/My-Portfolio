<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yang — MyPortfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"> <!--This prepares the browser to load fonts faster.-->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- This downloads -Space Grotesk-Inter-IBM Plex Mono-so CSS can use them. -->
     <style>
        /* This creates variables. */
        :root{ 
            /* Backgrounds */
            --bg:#FFFBF2;
            --surface:#FFFFFF;
            --surface-2:#F2EEDF;
            /* Text colors */
            --text:#1B1D24;
            --text-dim:#6E7180; 
            /* Accent colors */
            --pink:#FF3D81;
            --cyan:#00B8B0;
            --yellow:#FFC93C;
            --yellow-text:#C98A00;
            /* Borders */
            --line: rgba(27,29,36,0.13);
            --badge-bg:#1B1D24;
            --badge-text:#FFFBF2;
            /* Rounded corners */
            --radius: 10px;
        }
        /* This tells every element-Width includes padding and border.It makes layouts easier. */
        *{
            box-sizing:border-box;
        }
        /* This creates smooth scrolling when clicking navigation links. */
        html{
            scroll-behavior:smooth; 
        }
        /* This affects the whole webpage. */
        body{
            /* No margin */
            margin:0;
            /* Background */
            background:var(--bg);
            /* Text color */
            color:var(--text);
            /* Font */
            font-family:'Inter';
            /* Default font size */
            font-size:16px;
            /* Spacing between lines */
            line-height:1.55;
        }
        /* Headings */
        h1,h2,h3{
            font-family:'Space Grotesk',sans-serif;
            margin:0;
            letter-spacing:-0.01em;
        }
        /* Whenever an element has
        class="mono" -it becomes-IBM Plex Mono. */
        .mono{
            font-family:'IBM Plex Mono',monospace;
            letter-spacing:0.02em;
        }

        /* Default Styles */
        /* Links */
        a{
            color:inherit;
        }
        /* Images - Images never overflow their container.*/
        img{
            max-width:100%;
        }
        /* This is used everywhere. max-width:1180px->Centers everything - Adds side padding.
        Without this the page would stretch across the entire monitor. */
        .wrap{
            max-width:1180px;margin:0 auto;padding:0 32px;
        }
        /* If the screen becomes smaller than 640 pixels.. Use padding:20px; instead.*/
        @media(max-width:640px) {
            .wrap{padding:0 20px;}
        }

        /* ---------- NAV ---------- */
        header.nav{
            position:sticky; top:0; z-index:50; /*position:sticky;So it stays at the top. */
            background:rgba(255,251,242,0.88); 
            backdrop-filter:blur(10px);
            border-bottom:1px solid var(--line);
        }

        .nav-inner{
            max-width:1180px;margin:0 auto;padding:0 32px;
            display:flex;align-items:center;justify-content:space-between;
            height:56px;
        }

        .filetab{
            display:flex;align-items:center;gap:8px;
            font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--text-dim);
            padding:6px 14px;background:var(--surface-2);border-radius:6px 6px 0 0;
            border:1px solid var(--line);border-bottom:none;
        }

        .filetab::before{
            content:"";width:8px;height:8px;border-radius:50%;background:var(--pink);
        }
        nav.links{
            display:flex;gap:28px;
        }

        nav.links a{
            font-size:13px;text-decoration:none;color:var(--text-dim);
            font-family:'IBM Plex Mono',monospace;
            padding:4px 0;border-bottom:2px solid transparent;
            transition:color .2s, border-color .2s;
        }

        nav.links a:hover{
            color:var(--text);border-color:var(--cyan);
        }

        @media (max-width:640px){
            nav.links{gap:16px;} nav.links a{font-size:11px;}
        }



     </style>
</head>
<body>

    <header class="nav">
        <div class="nav-inner">
            <!-- my suggest ns dili na i apil ang canva -->
            <div class="filetab">yang-portfolio<span style="opacity:.5">.canva</span></div> 
            <nav class="links">
                <a href="#templates">Templates</a>
                <a href="#elements">Elements</a>
                <a href="#toolkit">Toolkit</a>
                <a href="#about">About</a>
                <a href="#contact">Contact</a>
            </nav>
        </div>
    </header>

    <section class="hero">

    </section>
    
</body>
</html>
